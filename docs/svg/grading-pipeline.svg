<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 920" width="780" height="920" role="img" font-family="'Segoe UI', system-ui, sans-serif">
  <title>Automated Grading Pipeline — Fig. 1</title>
  <desc>Overall architecture of the automated grading pipeline, showing flow from student and reference answers through NLP metrics, base score, semantic analysis, confidence score, final score, marks given, to output with teacher attention flag.</desc>

  <!-- Background -->
  <rect width="780" height="920" fill="#f8f9fa" rx="12"/>

  <!-- ─── DEFS: arrowhead marker ─────────────────────────────────────── -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#333" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#2d7a2d" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 1 — INPUT
  ════════════════════════════════════════════════════════════════════ -->
  <!-- Box -->
  <rect x="265" y="28" width="250" height="56" rx="8"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="390" y="51" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Input: Student &amp;</text>
  <text x="390" y="68" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Reference Answers</text>

  <!-- Arrow down -->
  <line x1="390" y1="84" x2="390" y2="114" stroke="#333" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 2 — TEXT PREPROCESSING
  ════════════════════════════════════════════════════════════════════ -->
  <rect x="290" y="116" width="200" height="44" rx="8"
        fill="#e9ecef" stroke="#adb5bd" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="390" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">Text Preprocessing</text>

  <!-- Fan-out arrows from preprocessing to 4 NLP nodes -->
  <!-- Left-most (Jaccard) -->
  <path d="M390 160 L390 178 L100 178 L100 202"
        fill="none" stroke="#2d7a2d" stroke-width="1.6" marker-end="url(#arrow-green)"/>
  <!-- Center-left (Edit Distance) -->
  <path d="M390 160 L390 178 L280 178 L280 202"
        fill="none" stroke="#2d7a2d" stroke-width="1.6" marker-end="url(#arrow-green)"/>
  <!-- Center-right (Cosine) -->
  <path d="M390 160 L390 178 L500 178 L500 202"
        fill="none" stroke="#2d7a2d" stroke-width="1.6" marker-end="url(#arrow-green)"/>
  <!-- Right-most (Normalized Word Count) -->
  <path d="M390 160 L390 178 L680 178 L680 202"
        fill="none" stroke="#2d7a2d" stroke-width="1.6" marker-end="url(#arrow-green)"/>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 3 — FOUR NLP METRIC BOXES
  ════════════════════════════════════════════════════════════════════ -->

  <!-- Jaccard Similarity -->
  <rect x="28" y="202" width="144" height="52" rx="8"
        fill="#dcfce7" stroke="#16a34a" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="100" y="224" text-anchor="middle" font-size="11.5" font-weight="600" fill="#14532d">Jaccard Similarity</text>
  <text x="100" y="241" text-anchor="middle" font-size="11.5" font-weight="600" fill="#14532d">15%</text>

  <!-- Edit Distance -->
  <rect x="208" y="202" width="144" height="52" rx="8"
        fill="#dcfce7" stroke="#16a34a" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="280" y="224" text-anchor="middle" font-size="11.5" font-weight="600" fill="#14532d">Edit Distance</text>
  <text x="280" y="241" text-anchor="middle" font-size="11.5" font-weight="600" fill="#14532d">5% Inverted</text>

  <!-- Cosine Similarity -->
  <rect x="428" y="202" width="144" height="52" rx="8"
        fill="#dcfce7" stroke="#16a34a" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="500" y="224" text-anchor="middle" font-size="11.5" font-weight="600" fill="#14532d">Cosine Similarity</text>
  <text x="500" y="241" text-anchor="middle" font-size="11.5" font-weight="600" fill="#14532d">15%</text>

  <!-- Normalized Word Count -->
  <rect x="608" y="202" width="144" height="52" rx="8"
        fill="#dcfce7" stroke="#16a34a" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="680" y="224" text-anchor="middle" font-size="11.5" font-weight="600" fill="#14532d">Normalized Word</text>
  <text x="680" y="241" text-anchor="middle" font-size="11.5" font-weight="600" fill="#14532d">Count  15%</text>

  <!-- Fan-IN arrows from 4 NLP nodes → Base Score -->
  <!-- From Jaccard -->
  <path d="M100 254 L100 316 L340 316 L340 334"
        fill="none" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- From Edit Distance -->
  <path d="M280 254 L280 316 L370 316 L370 334"
        fill="none" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- From Cosine -->
  <path d="M500 254 L500 316 L410 316 L410 334"
        fill="none" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- From Normalized Word Count -->
  <path d="M680 254 L680 316 L440 316 L440 334"
        fill="none" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 4 — BASE SCORE CALCULATION
  ════════════════════════════════════════════════════════════════════ -->
  <rect x="265" y="334" width="250" height="48" rx="8"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="390" y="363" text-anchor="middle" font-size="13" font-weight="600" fill="#3b0764">Base Score Calculation</text>

  <!-- Arrow down -->
  <line x1="390" y1="382" x2="390" y2="412" stroke="#333" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 5 — SEMANTIC ANALYSIS USE SCORE
  ════════════════════════════════════════════════════════════════════ -->
  <rect x="265" y="414" width="250" height="52" rx="8"
        fill="#fef3c7" stroke="#d97706" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="390" y="437" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">Semantic Analysis</text>
  <text x="390" y="454" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">USE Score  50%</text>

  <!-- Arrow down -->
  <line x1="390" y1="466" x2="390" y2="496" stroke="#333" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 6 — CONFIDENCE SCORE CALCULATION
  ════════════════════════════════════════════════════════════════════ -->
  <rect x="265" y="498" width="250" height="48" rx="8"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="390" y="527" text-anchor="middle" font-size="13" font-weight="600" fill="#3b0764">Confidence Score Calculation</text>

  <!-- Arrow down -->
  <line x1="390" y1="546" x2="390" y2="576" stroke="#333" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 7 — FINAL SCORE CALCULATION
  ════════════════════════════════════════════════════════════════════ -->
  <rect x="265" y="578" width="250" height="48" rx="8"
        fill="#fef3c7" stroke="#d97706" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="390" y="607" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">Final Score Calculation</text>

  <!-- Arrow down -->
  <line x1="390" y1="626" x2="390" y2="656" stroke="#333" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 8 — MARKS GIVEN
  ════════════════════════════════════════════════════════════════════ -->
  <rect x="290" y="658" width="200" height="48" rx="8"
        fill="#fce7f3" stroke="#be185d" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="390" y="687" text-anchor="middle" font-size="13" font-weight="600" fill="#831843">Marks Given</text>

  <!-- Arrow down -->
  <line x1="390" y1="706" x2="390" y2="736" stroke="#333" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════════════
       ROW 9 — OUTPUT
  ════════════════════════════════════════════════════════════════════ -->
  <rect x="265" y="738" width="250" height="56" rx="8"
        fill="#fee2e2" stroke="#dc2626" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="390" y="762" text-anchor="middle" font-size="13" font-weight="600" fill="#7f1d1d">Output: Score +</text>
  <text x="390" y="779" text-anchor="middle" font-size="13" font-weight="600" fill="#7f1d1d">Teacher Attention Flag</text>

  <!-- ═══════════════════════════════════════════════════════════════════
       CAPTION
  ════════════════════════════════════════════════════════════════════ -->
  <line x1="40" y1="840" x2="740" y2="840" stroke="#dee2e6" stroke-width="1"/>
  <text x="390" y="866" text-anchor="middle" font-size="12.5" font-style="italic" fill="#6c757d">Fig. 1.  Overall architecture of the automated grading pipeline.</text>

  <!-- ═══════════════════════════════════════════════════════════════════
       LEGEND
  ════════════════════════════════════════════════════════════════════ -->
  <text x="390" y="896" text-anchor="middle" font-size="10.5" fill="#9ca3af">
    Ayaan &amp; Ng · MethodsX 14 (2025) 103395
  </text>
</svg>
